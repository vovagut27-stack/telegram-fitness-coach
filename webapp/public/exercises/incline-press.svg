<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Incline press">
  <defs>
    <linearGradient id="incline-press-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="incline-press-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="incline-press-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="incline-press-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="incline-press-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="incline-press-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="incline-press-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#incline-press-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Incline press</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#incline-press-card)" filter="url(#incline-press-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <path d="M14 148 L154 118" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/><line x1="30" y1="95" x2="140" y2="88" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="118" y1="114" x2="142" y2="98" stroke="url(#incline-press-body)" stroke-width="8" stroke-linecap="round"/><circle cx="118" cy="114" r="4.5" fill="#475569"/><circle cx="142" cy="98" r="4.5" fill="#475569"/><line x1="118" y1="114" x2="142" y2="118" stroke="url(#incline-press-body)" stroke-width="8" stroke-linecap="round"/><circle cx="118" cy="114" r="4.5" fill="#475569"/><circle cx="142" cy="118" r="4.5" fill="#475569"/>
    <path d="M32 112 L118 108 L118 124 L32 120 Z" fill="url(#incline-press-body)"/>
    <circle cx="32" cy="102" r="11" fill="url(#incline-press-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="78" cy="112" rx="36" ry="12" fill="url(#incline-press-muscle)" opacity="0.88" filter="url(#incline-press-glow)" transform="rotate(0 78 112)"/>
  </g>
</svg>