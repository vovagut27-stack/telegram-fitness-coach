<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Chest fly">
  <defs>
    <linearGradient id="chest-fly-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="chest-fly-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="chest-fly-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="chest-fly-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="chest-fly-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="chest-fly-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="chest-fly-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#chest-fly-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Chest fly</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#chest-fly-card)" filter="url(#chest-fly-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <rect x="14" y="132" width="140" height="10" rx="3" fill="#94a3b8"/><rect x="18" y="142" width="8" height="28" fill="#64748b"/><rect x="146" y="142" width="8" height="28" fill="#64748b"/>
    <line x1="78" y1="122" x2="42" y2="108" stroke="url(#chest-fly-body)" stroke-width="7" stroke-linecap="round"/><circle cx="78" cy="122" r="4.5" fill="#475569"/><circle cx="42" cy="108" r="4.5" fill="#475569"/><line x1="90" y1="122" x2="126" y2="108" stroke="url(#chest-fly-body)" stroke-width="7" stroke-linecap="round"/><circle cx="90" cy="122" r="4.5" fill="#475569"/><circle cx="126" cy="108" r="4.5" fill="#475569"/><line x1="78" y1="132" x2="72" y2="158" stroke="url(#chest-fly-body)" stroke-width="8" stroke-linecap="round"/><circle cx="78" cy="132" r="4.5" fill="#475569"/><circle cx="72" cy="158" r="4.5" fill="#475569"/><line x1="90" y1="132" x2="96" y2="158" stroke="url(#chest-fly-body)" stroke-width="8" stroke-linecap="round"/><circle cx="90" cy="132" r="4.5" fill="#475569"/><circle cx="96" cy="158" r="4.5" fill="#475569"/>
    <path d="M74 118 L78 132 L90 132 L94 118 Z" fill="url(#chest-fly-body)"/>
    <circle cx="84" cy="108" r="11" fill="url(#chest-fly-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="125" rx="22" ry="10" fill="url(#chest-fly-muscle)" opacity="0.88" filter="url(#chest-fly-glow)" transform="rotate(0 84 125)"/><ellipse cx="48" cy="112" rx="10" ry="14" fill="url(#chest-fly-muscle)" opacity="0.88" filter="url(#chest-fly-glow)" transform="rotate(-20 48 112)"/><ellipse cx="120" cy="112" rx="10" ry="14" fill="url(#chest-fly-muscle)" opacity="0.88" filter="url(#chest-fly-glow)" transform="rotate(20 120 112)"/>
  </g>
</svg>