<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Pull-up">
  <defs>
    <linearGradient id="pull-up-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="pull-up-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="pull-up-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="pull-up-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="pull-up-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="pull-up-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="pull-up-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#pull-up-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Pull-up</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#pull-up-card)" filter="url(#pull-up-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="28" y1="42" x2="140" y2="42" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="74" y1="88" x2="58" y2="48" stroke="url(#pull-up-body)" stroke-width="8" stroke-linecap="round"/><circle cx="74" cy="88" r="4.5" fill="#475569"/><circle cx="58" cy="48" r="4.5" fill="#475569"/><line x1="94" y1="88" x2="110" y2="48" stroke="url(#pull-up-body)" stroke-width="8" stroke-linecap="round"/><circle cx="94" cy="88" r="4.5" fill="#475569"/><circle cx="110" cy="48" r="4.5" fill="#475569"/><line x1="78" y1="118" x2="76" y2="158" stroke="url(#pull-up-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="118" r="4.5" fill="#475569"/><circle cx="76" cy="158" r="4.5" fill="#475569"/><line x1="90" y1="118" x2="92" y2="158" stroke="url(#pull-up-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="118" r="4.5" fill="#475569"/><circle cx="92" cy="158" r="4.5" fill="#475569"/>
    <path d="M74 82 L78 118 L90 118 L94 82 Z" fill="url(#pull-up-body)"/>
    <circle cx="84" cy="72" r="11" fill="url(#pull-up-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="98" rx="22" ry="12" fill="url(#pull-up-muscle)" opacity="0.88" filter="url(#pull-up-glow)" transform="rotate(0 84 98)"/><ellipse cx="56" cy="62" rx="10" ry="14" fill="url(#pull-up-muscle)" opacity="0.88" filter="url(#pull-up-glow)" transform="rotate(-25 56 62)"/><ellipse cx="112" cy="62" rx="10" ry="14" fill="url(#pull-up-muscle)" opacity="0.88" filter="url(#pull-up-glow)" transform="rotate(25 112 62)"/>
  </g>
</svg>