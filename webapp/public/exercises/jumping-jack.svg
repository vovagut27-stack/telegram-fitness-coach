<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Jumping jack">
  <defs>
    <linearGradient id="jumping-jack-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="jumping-jack-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="jumping-jack-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="jumping-jack-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="jumping-jack-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="jumping-jack-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="jumping-jack-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#jumping-jack-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Jumping jack</text>
  
  <text x="100" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">старт</text>
  <text x="300" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">финиш</text>
  <path d="M 188 132 L 212 132" stroke="#10b981" stroke-width="3" marker-end="url(#jumping-jack-arrow)"/>
  
  <g transform="translate(16, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#jumping-jack-card)" filter="url(#jumping-jack-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="78" y1="58" x2="66" y2="70" stroke="url(#jumping-jack-body)" stroke-width="7" stroke-linecap="round"/><circle cx="78" cy="58" r="4.5" fill="#475569"/><circle cx="66" cy="70" r="4.5" fill="#475569"/><line x1="90" y1="58" x2="102" y2="70" stroke="url(#jumping-jack-body)" stroke-width="7" stroke-linecap="round"/><circle cx="90" cy="58" r="4.5" fill="#475569"/><circle cx="102" cy="70" r="4.5" fill="#475569"/><line x1="66" y1="70" x2="52" y2="58" stroke="url(#jumping-jack-body)" stroke-width="6" stroke-linecap="round"/><circle cx="66" cy="70" r="4.5" fill="#475569"/><circle cx="52" cy="58" r="4.5" fill="#475569"/><line x1="102" y1="70" x2="116" y2="58" stroke="url(#jumping-jack-body)" stroke-width="6" stroke-linecap="round"/><circle cx="102" cy="70" r="4.5" fill="#475569"/><circle cx="116" cy="58" r="4.5" fill="#475569"/><line x1="78" y1="88" x2="72" y2="138" stroke="url(#jumping-jack-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="88" r="4.5" fill="#475569"/><circle cx="72" cy="138" r="4.5" fill="#475569"/><line x1="90" y1="88" x2="96" y2="138" stroke="url(#jumping-jack-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="88" r="4.5" fill="#475569"/><circle cx="96" cy="138" r="4.5" fill="#475569"/><line x1="72" y1="138" x2="68" y2="168" stroke="url(#jumping-jack-body)" stroke-width="8" stroke-linecap="round"/><circle cx="72" cy="138" r="4.5" fill="#475569"/><circle cx="68" cy="168" r="4.5" fill="#475569"/><line x1="96" y1="138" x2="100" y2="168" stroke="url(#jumping-jack-body)" stroke-width="8" stroke-linecap="round"/><circle cx="96" cy="138" r="4.5" fill="#475569"/><circle cx="100" cy="168" r="4.5" fill="#475569"/>
    <path d="M74 54 L78 88 L90 88 L94 54 Z" fill="url(#jumping-jack-body)"/>
    <circle cx="84" cy="42" r="11" fill="url(#jumping-jack-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="50" cy="64" rx="9" ry="13" fill="url(#jumping-jack-muscle)" opacity="0.88" filter="url(#jumping-jack-glow)" transform="rotate(-28 50 64)"/><ellipse cx="118" cy="64" rx="9" ry="13" fill="url(#jumping-jack-muscle)" opacity="0.88" filter="url(#jumping-jack-glow)" transform="rotate(28 118 64)"/>
  </g>
  
  <g transform="translate(216, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#jumping-jack-card)" filter="url(#jumping-jack-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="78" y1="58" x2="46" y2="36" stroke="url(#jumping-jack-body)" stroke-width="8" stroke-linecap="round"/><circle cx="78" cy="58" r="4.5" fill="#475569"/><circle cx="46" cy="36" r="4.5" fill="#475569"/><line x1="90" y1="58" x2="122" y2="36" stroke="url(#jumping-jack-body)" stroke-width="8" stroke-linecap="round"/><circle cx="90" cy="58" r="4.5" fill="#475569"/><circle cx="122" cy="36" r="4.5" fill="#475569"/><line x1="78" y1="88" x2="64" y2="138" stroke="url(#jumping-jack-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="88" r="4.5" fill="#475569"/><circle cx="64" cy="138" r="4.5" fill="#475569"/><line x1="90" y1="88" x2="104" y2="138" stroke="url(#jumping-jack-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="88" r="4.5" fill="#475569"/><circle cx="104" cy="138" r="4.5" fill="#475569"/><line x1="64" y1="138" x2="58" y2="168" stroke="url(#jumping-jack-body)" stroke-width="8" stroke-linecap="round"/><circle cx="64" cy="138" r="4.5" fill="#475569"/><circle cx="58" cy="168" r="4.5" fill="#475569"/><line x1="104" y1="138" x2="110" y2="168" stroke="url(#jumping-jack-body)" stroke-width="8" stroke-linecap="round"/><circle cx="104" cy="138" r="4.5" fill="#475569"/><circle cx="110" cy="168" r="4.5" fill="#475569"/>
    <path d="M74 54 L78 88 L90 88 L94 54 Z" fill="url(#jumping-jack-body)"/>
    <circle cx="84" cy="42" r="11" fill="url(#jumping-jack-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="40" cy="42" rx="10" ry="15" fill="url(#jumping-jack-muscle)" opacity="0.88" filter="url(#jumping-jack-glow)" transform="rotate(-38 40 42)"/><ellipse cx="128" cy="42" rx="10" ry="15" fill="url(#jumping-jack-muscle)" opacity="0.88" filter="url(#jumping-jack-glow)" transform="rotate(38 128 42)"/><ellipse cx="84" cy="64" rx="18" ry="10" fill="url(#jumping-jack-muscle)" opacity="0.88" filter="url(#jumping-jack-glow)" transform="rotate(0 84 64)"/>
  </g>
</svg>