<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Bench press">
  <defs>
    <linearGradient id="bench-press-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="bench-press-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="bench-press-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="bench-press-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="bench-press-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="bench-press-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="bench-press-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#bench-press-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Bench press</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#bench-press-card)" filter="url(#bench-press-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <rect x="14" y="132" width="140" height="10" rx="3" fill="#94a3b8"/><rect x="18" y="142" width="8" height="28" fill="#64748b"/><rect x="146" y="142" width="8" height="28" fill="#64748b"/><line x1="24" y1="108" x2="144" y2="108" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="28" y1="108" x2="18" y2="125" stroke="url(#bench-press-body)" stroke-width="7" stroke-linecap="round"/><circle cx="28" cy="108" r="4.5" fill="#475569"/><circle cx="18" cy="125" r="4.5" fill="#475569"/><line x1="115" y1="118" x2="138" y2="108" stroke="url(#bench-press-body)" stroke-width="8" stroke-linecap="round"/><circle cx="115" cy="118" r="4.5" fill="#475569"/><circle cx="138" cy="108" r="4.5" fill="#475569"/><line x1="115" y1="118" x2="138" y2="128" stroke="url(#bench-press-body)" stroke-width="8" stroke-linecap="round"/><circle cx="115" cy="118" r="4.5" fill="#475569"/><circle cx="138" cy="128" r="4.5" fill="#475569"/>
    <path d="M28 118 L115 118 L115 134 L28 130 Z" fill="url(#bench-press-body)"/>
    <circle cx="28" cy="108" r="11" fill="url(#bench-press-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="72" cy="122" rx="38" ry="12" fill="url(#bench-press-muscle)" opacity="0.88" filter="url(#bench-press-glow)" transform="rotate(0 72 122)"/><ellipse cx="130" cy="112" rx="10" ry="14" fill="url(#bench-press-muscle)" opacity="0.88" filter="url(#bench-press-glow)" transform="rotate(15 130 112)"/>
  </g>
</svg>