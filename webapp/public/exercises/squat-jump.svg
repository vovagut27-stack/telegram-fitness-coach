<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Squat jump">
  <defs>
    <linearGradient id="squat-jump-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="squat-jump-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="squat-jump-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="squat-jump-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="squat-jump-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="squat-jump-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="squat-jump-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#squat-jump-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Squat jump</text>
  
  <text x="100" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">старт</text>
  <text x="300" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">финиш</text>
  <path d="M 188 132 L 212 132" stroke="#10b981" stroke-width="3" marker-end="url(#squat-jump-arrow)"/>
  
  <g transform="translate(16, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#squat-jump-card)" filter="url(#squat-jump-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="72" y1="102" x2="58" y2="142" stroke="url(#squat-jump-body)" stroke-width="10" stroke-linecap="round"/><circle cx="72" cy="102" r="4.5" fill="#475569"/><circle cx="58" cy="142" r="4.5" fill="#475569"/><line x1="92" y1="102" x2="110" y2="142" stroke="url(#squat-jump-body)" stroke-width="10" stroke-linecap="round"/><circle cx="92" cy="102" r="4.5" fill="#475569"/><circle cx="110" cy="142" r="4.5" fill="#475569"/><line x1="58" y1="142" x2="54" y2="168" stroke="url(#squat-jump-body)" stroke-width="9" stroke-linecap="round"/><circle cx="58" cy="142" r="4.5" fill="#475569"/><circle cx="54" cy="168" r="4.5" fill="#475569"/><line x1="110" y1="142" x2="114" y2="168" stroke="url(#squat-jump-body)" stroke-width="9" stroke-linecap="round"/><circle cx="110" cy="142" r="4.5" fill="#475569"/><circle cx="114" cy="168" r="4.5" fill="#475569"/>
    <path d="M70 62 L74 102 L94 102 L98 62 Z" fill="url(#squat-jump-body)"/>
    <circle cx="84" cy="52" r="11" fill="url(#squat-jump-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="66" cy="128" rx="14" ry="18" fill="url(#squat-jump-muscle)" opacity="0.88" filter="url(#squat-jump-glow)" transform="rotate(0 66 128)"/><ellipse cx="102" cy="128" rx="14" ry="18" fill="url(#squat-jump-muscle)" opacity="0.88" filter="url(#squat-jump-glow)" transform="rotate(0 102 128)"/>
  </g>
  
  <g transform="translate(216, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#squat-jump-card)" filter="url(#squat-jump-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/><path d="M70 158 Q84 140 98 158" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="4 3"/>
    <line x1="78" y1="72" x2="72" y2="118" stroke="url(#squat-jump-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="72" r="4.5" fill="#475569"/><circle cx="72" cy="118" r="4.5" fill="#475569"/><line x1="90" y1="72" x2="96" y2="118" stroke="url(#squat-jump-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="72" r="4.5" fill="#475569"/><circle cx="96" cy="118" r="4.5" fill="#475569"/><line x1="72" y1="118" x2="68" y2="148" stroke="url(#squat-jump-body)" stroke-width="8" stroke-linecap="round"/><circle cx="72" cy="118" r="4.5" fill="#475569"/><circle cx="68" cy="148" r="4.5" fill="#475569"/><line x1="96" y1="118" x2="100" y2="148" stroke="url(#squat-jump-body)" stroke-width="8" stroke-linecap="round"/><circle cx="96" cy="118" r="4.5" fill="#475569"/><circle cx="100" cy="148" r="4.5" fill="#475569"/>
    <path d="M74 38 L78 72 L90 72 L94 38 Z" fill="url(#squat-jump-body)"/>
    <circle cx="84" cy="28" r="11" fill="url(#squat-jump-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="55" rx="18" ry="12" fill="url(#squat-jump-muscle)" opacity="0.88" filter="url(#squat-jump-glow)" transform="rotate(0 84 55)"/>
  </g>
</svg>