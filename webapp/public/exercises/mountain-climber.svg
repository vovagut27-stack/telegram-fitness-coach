<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Mountain climber">
  <defs>
    <linearGradient id="mountain-climber-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="mountain-climber-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="mountain-climber-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="mountain-climber-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="mountain-climber-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="mountain-climber-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="mountain-climber-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#mountain-climber-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Mountain climber</text>
  
  <text x="100" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">старт</text>
  <text x="300" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">финиш</text>
  <path d="M 188 132 L 212 132" stroke="#10b981" stroke-width="3" marker-end="url(#mountain-climber-arrow)"/>
  
  <g transform="translate(16, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#mountain-climber-card)" filter="url(#mountain-climber-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="138" x2="156" y2="138" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="120" y1="126" x2="145" y2="140" stroke="url(#mountain-climber-body)" stroke-width="8" stroke-linecap="round"/><circle cx="120" cy="126" r="4.5" fill="#475569"/><circle cx="145" cy="140" r="4.5" fill="#475569"/><line x1="120" y1="126" x2="145" y2="162" stroke="url(#mountain-climber-body)" stroke-width="8" stroke-linecap="round"/><circle cx="120" cy="126" r="4.5" fill="#475569"/><circle cx="145" cy="162" r="4.5" fill="#475569"/><line x1="120" y1="124" x2="100" y2="88" stroke="url(#mountain-climber-body)" stroke-width="9" stroke-linecap="round"/><circle cx="120" cy="124" r="4.5" fill="#475569"/><circle cx="100" cy="88" r="4.5" fill="#475569"/>
    <path d="M32 118 L120 120 L120 134 L32 130 Z" fill="url(#mountain-climber-body)"/>
    <circle cx="32" cy="108" r="11" fill="url(#mountain-climber-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="78" cy="124" rx="36" ry="10" fill="url(#mountain-climber-muscle)" opacity="0.88" filter="url(#mountain-climber-glow)" transform="rotate(0 78 124)"/>
  </g>
  
  <g transform="translate(216, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#mountain-climber-card)" filter="url(#mountain-climber-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="138" x2="156" y2="138" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="120" y1="126" x2="145" y2="140" stroke="url(#mountain-climber-body)" stroke-width="8" stroke-linecap="round"/><circle cx="120" cy="126" r="4.5" fill="#475569"/><circle cx="145" cy="140" r="4.5" fill="#475569"/><line x1="120" y1="126" x2="145" y2="162" stroke="url(#mountain-climber-body)" stroke-width="8" stroke-linecap="round"/><circle cx="120" cy="126" r="4.5" fill="#475569"/><circle cx="145" cy="162" r="4.5" fill="#475569"/><line x1="120" y1="124" x2="138" y2="88" stroke="url(#mountain-climber-body)" stroke-width="9" stroke-linecap="round"/><circle cx="120" cy="124" r="4.5" fill="#475569"/><circle cx="138" cy="88" r="4.5" fill="#475569"/>
    <path d="M32 118 L120 120 L120 134 L32 130 Z" fill="url(#mountain-climber-body)"/>
    <circle cx="32" cy="108" r="11" fill="url(#mountain-climber-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="78" cy="124" rx="36" ry="10" fill="url(#mountain-climber-muscle)" opacity="0.88" filter="url(#mountain-climber-glow)" transform="rotate(0 78 124)"/>
  </g>
</svg>