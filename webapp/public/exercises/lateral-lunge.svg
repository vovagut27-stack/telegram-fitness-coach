<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Lateral lunge">
  <defs>
    <linearGradient id="lateral-lunge-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="lateral-lunge-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="lateral-lunge-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="lateral-lunge-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="lateral-lunge-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="lateral-lunge-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="lateral-lunge-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#lateral-lunge-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Lateral lunge</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#lateral-lunge-card)" filter="url(#lateral-lunge-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="78" y1="48" x2="62" y2="58" stroke="url(#lateral-lunge-body)" stroke-width="7" stroke-linecap="round"/><circle cx="78" cy="48" r="4.5" fill="#475569"/><circle cx="62" cy="58" r="4.5" fill="#475569"/><line x1="90" y1="48" x2="106" y2="58" stroke="url(#lateral-lunge-body)" stroke-width="7" stroke-linecap="round"/><circle cx="90" cy="48" r="4.5" fill="#475569"/><circle cx="106" cy="58" r="4.5" fill="#475569"/><line x1="78" y1="78" x2="72" y2="128" stroke="url(#lateral-lunge-body)" stroke-width="10" stroke-linecap="round"/><circle cx="78" cy="78" r="4.5" fill="#475569"/><circle cx="72" cy="128" r="4.5" fill="#475569"/><line x1="90" y1="78" x2="118" y2="128" stroke="url(#lateral-lunge-body)" stroke-width="10" stroke-linecap="round"/><circle cx="90" cy="78" r="4.5" fill="#475569"/><circle cx="118" cy="128" r="4.5" fill="#475569"/><line x1="72" y1="128" x2="70" y2="168" stroke="url(#lateral-lunge-body)" stroke-width="9" stroke-linecap="round"/><circle cx="72" cy="128" r="4.5" fill="#475569"/><circle cx="70" cy="168" r="4.5" fill="#475569"/><line x1="118" y1="128" x2="122" y2="168" stroke="url(#lateral-lunge-body)" stroke-width="9" stroke-linecap="round"/><circle cx="118" cy="128" r="4.5" fill="#475569"/><circle cx="122" cy="168" r="4.5" fill="#475569"/>
    <path d="M74 42 L78 78 L90 78 L94 42 Z" fill="url(#lateral-lunge-body)"/>
    <circle cx="84" cy="32" r="11" fill="url(#lateral-lunge-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="112" cy="115" rx="16" ry="20" fill="url(#lateral-lunge-muscle)" opacity="0.88" filter="url(#lateral-lunge-glow)" transform="rotate(0 112 115)"/>
