<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Inverted row">
  <defs>
    <linearGradient id="inverted-row-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="inverted-row-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="inverted-row-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="inverted-row-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="inverted-row-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="inverted-row-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="inverted-row-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#inverted-row-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Inverted row</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#inverted-row-card)" filter="url(#inverted-row-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="20" y1="52" x2="148" y2="52" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="74" y1="98" x2="74" y2="58" stroke="url(#inverted-row-body)" stroke-width="8" stroke-linecap="round"/><circle cx="74" cy="98" r="4.5" fill="#475569"/><circle cx="74" cy="58" r="4.5" fill="#475569"/><line x1="94" y1="98" x2="94" y2="58" stroke="url(#inverted-row-body)" stroke-width="8" stroke-linecap="round"/><circle cx="94" cy="98" r="4.5" fill="#475569"/><circle cx="94" cy="58" r="4.5" fill="#475569"/><line x1="78" y1="128" x2="64" y2="158" stroke="url(#inverted-row-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="128" r="4.5" fill="#475569"/><circle cx="64" cy="158" r="4.5" fill="#475569"/><line x1="90" y1="128" x2="104" y2="158" stroke="url(#inverted-row-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="128" r="4.5" fill="#475569"/><circle cx="104" cy="158" r="4.5" fill="#475569"/>
    <path d="M74 102 L78 128 L90 128 L94 102 Z" fill="url(#inverted-row-body)"/>
    <circle cx="84" cy="95" r="11" fill="url(#inverted-row-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="115" rx="24" ry="11" fill="url(#inverted-row-muscle)" opacity="0.88" filter="url(#inverted-row-glow)" transform="rotate(0 84 115)"/>
  </g>
</svg>