<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Bicycle crunch">
  <defs>
    <linearGradient id="bicycle-crunch-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="bicycle-crunch-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="bicycle-crunch-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="bicycle-crunch-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="bicycle-crunch-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="bicycle-crunch-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="bicycle-crunch-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#bicycle-crunch-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Bicycle crunch</text>
  
  <text x="100" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">лево</text>
  <text x="300" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">право</text>
  <path d="M 188 132 L 212 132" stroke="#10b981" stroke-width="3" marker-end="url(#bicycle-crunch-arrow)"/>
  
  <g transform="translate(16, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#bicycle-crunch-card)" filter="url(#bicycle-crunch-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="155" x2="156" y2="155" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/><rect x="14" y="148" width="140" height="10" rx="3" fill="#94a3b8"/><rect x="18" y="158" width="8" height="28" fill="#64748b"/><rect x="146" y="158" width="8" height="28" fill="#64748b"/>
    <line x1="100" y1="132" x2="118" y2="95" stroke="url(#bicycle-crunch-body)" stroke-width="9" stroke-linecap="round"/><circle cx="100" cy="132" r="4.5" fill="#475569"/><circle cx="118" cy="95" r="4.5" fill="#475569"/><line x1="88" y1="122" x2="62" y2="135" stroke="url(#bicycle-crunch-body)" stroke-width="8" stroke-linecap="round"/><circle cx="88" cy="122" r="4.5" fill="#475569"/><circle cx="62" cy="135" r="4.5" fill="#475569"/>
    <path d="M88 122 L110 100 L122 112 L100 132 Z" fill="url(#bicycle-crunch-body)"/>
    <circle cx="110" cy="112" r="11" fill="url(#bicycle-crunch-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="102" cy="115" rx="20" ry="12" fill="url(#bicycle-crunch-muscle)" opacity="0.88" filter="url(#bicycle-crunch-glow)" transform="rotate(0 102 115)"/>
  </g>
  
  <g transform="translate(216, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#bicycle-crunch-card)" filter="url(#bicycle-crunch-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="155" x2="156" y2="155" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/><rect x="14" y="148" width="140" height="10" rx="3" fill="#94a3b8"/><rect x="18" y="158" width="8" height="28" fill="#64748b"/><rect x="146" y="158" width="8" height="28" fill="#64748b"/>
    <line x1="100" y1="132" x2="82" y2="95" stroke="url(#bicycle-crunch-body)" stroke-width="9" stroke-linecap="round"/><circle cx="100" cy="132" r="4.5" fill="#475569"/><circle cx="82" cy="95" r="4.5" fill="#475569"/><line x1="88" y1="122" x2="62" y2="135" stroke="url(#bicycle-crunch-body)" stroke-width="8" stroke-linecap="round"/><circle cx="88" cy="122" r="4.5" fill="#475569"/><circle cx="62" cy="135" r="4.5" fill="#475569"/>
    <path d="M88 122 L110 100 L122 112 L100 132 Z" fill="url(#bicycle-crunch-body)"/>
    <circle cx="110" cy="112" r="11" fill="url(#bicycle-crunch-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="102" cy="115" rx="20" ry="12" fill="url(#bicycle-crunch-muscle)" opacity="0.88" filter="url(#bicycle-crunch-glow)" transform="rotate(0 102 115)"/>
  </g>
</svg>