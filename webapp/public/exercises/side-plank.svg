<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Side plank / Боковая">
  <defs>
    <linearGradient id="side-plank-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="side-plank-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="side-plank-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="side-plank-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="side-plank-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="side-plank-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="side-plank-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#side-plank-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Side plank / Боковая</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#side-plank-card)" filter="url(#side-plank-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="94" y1="82" x2="68" y2="102" stroke="url(#side-plank-body)" stroke-width="9" stroke-linecap="round"/><circle cx="94" cy="82" r="4.5" fill="#475569"/><circle cx="68" cy="102" r="4.5" fill="#475569"/><line x1="100" y1="128" x2="132" y2="152" stroke="url(#side-plank-body)" stroke-width="10" stroke-linecap="round"/><circle cx="100" cy="128" r="4.5" fill="#475569"/><circle cx="132" cy="152" r="4.5" fill="#475569"/><line x1="100" y1="128" x2="96" y2="168" stroke="url(#side-plank-body)" stroke-width="9" stroke-linecap="round"/><circle cx="100" cy="128" r="4.5" fill="#475569"/><circle cx="96" cy="168" r="4.5" fill="#475569"/>
    <path d="M94 74 L94 128 L106 128 L106 74 Z" fill="url(#side-plank-body)"/>
    <circle cx="100" cy="62" r="11" fill="url(#side-plank-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="100" cy="102" rx="12" ry="30" fill="url(#side-plank-muscle)" opacity="0.88" filter="url(#side-plank-glow)" transform="rotate(0 100 102)"/>
