<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Lat pulldown">
  <defs>
    <linearGradient id="lat-pulldown-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="lat-pulldown-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="lat-pulldown-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="lat-pulldown-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="lat-pulldown-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="lat-pulldown-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="lat-pulldown-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#lat-pulldown-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Lat pulldown</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#lat-pulldown-card)" filter="url(#lat-pulldown-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="40" y1="38" x2="128" y2="38" stroke="#475569" stroke-width="5" stroke-linecap="round"/><rect x="50" y="148" width="68" height="8" rx="3" fill="#94a3b8"/>
    <line x1="78" y1="74" x2="58" y2="48" stroke="url(#lat-pulldown-body)" stroke-width="8" stroke-linecap="round"/><circle cx="78" cy="74" r="4.5" fill="#475569"/><circle cx="58" cy="48" r="4.5" fill="#475569"/><line x1="90" y1="74" x2="110" y2="48" stroke="url(#lat-pulldown-body)" stroke-width="8" stroke-linecap="round"/><circle cx="90" cy="74" r="4.5" fill="#475569"/><circle cx="110" cy="48" r="4.5" fill="#475569"/><line x1="78" y1="118" x2="72" y2="148" stroke="url(#lat-pulldown-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="118" r="4.5" fill="#475569"/><circle cx="72" cy="148" r="4.5" fill="#475569"/><line x1="90" y1="118" x2="96" y2="148" stroke="url(#lat-pulldown-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="118" r="4.5" fill="#475569"/><circle cx="96" cy="148" r="4.5" fill="#475569"/>
    <path d="M74 68 L78 118 L90 118 L94 68 Z" fill="url(#lat-pulldown-body)"/>
    <circle cx="84" cy="58" r="11" fill="url(#lat-pulldown-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="92" rx="24" ry="14" fill="url(#lat-pulldown-muscle)" opacity="0.88" filter="url(#lat-pulldown-glow)" transform="rotate(0 84 92)"/>
  </g>
</svg>