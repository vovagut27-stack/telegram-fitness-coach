<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Arm raise">
  <defs>
    <linearGradient id="arm-raise-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="arm-raise-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="arm-raise-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="arm-raise-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="arm-raise-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="arm-raise-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arm-raise-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#arm-raise-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Arm raise</text>
  
  <text x="100" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">вниз</text>
  <text x="300" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#64748b">вверх</text>
