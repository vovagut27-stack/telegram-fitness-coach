<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Bird-dog">
  <defs>
    <linearGradient id="bird-dog-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="bird-dog-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="bird-dog-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="bird-dog-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="bird-dog-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="bird-dog-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="bird-dog-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#bird-dog-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Bird-dog</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#bird-dog-card)" filter="url(#bird-dog-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="138" x2="156" y2="138" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="122" y1="132" x2="148" y2="146" stroke="url(#bird-dog-body)" stroke-width="8" stroke-linecap="round"/><circle cx="122" cy="132" r="4.5" fill="#475569"/><circle cx="148" cy="146" r="4.5" fill="#475569"/><line x1="122" y1="132" x2="148" y2="166" stroke="url(#bird-dog-body)" stroke-width="8" stroke-linecap="round"/><circle cx="122" cy="132" r="4.5" fill="#475569"/><circle cx="148" cy="166" r="4.5" fill="#475569"/><line x1="122" y1="128" x2="152" y2="82" stroke="url(#bird-dog-body)" stroke-width="7" stroke-linecap="round"/><circle cx="122" cy="128" r="4.5" fill="#475569"/><circle cx="152" cy="82" r="4.5" fill="#475569"/><line x1="122" y1="128" x2="48" y2="90" stroke="url(#bird-dog-body)" stroke-width="7" stroke-linecap="round"/><circle cx="122" cy="128" r="4.5" fill="#475569"/><circle cx="48" cy="90" r="4.5" fill="#475569"/>
    <path d="M32 122 L122 124 L122 140 L32 136 Z" fill="url(#bird-dog-body)"/>
    <circle cx="32" cy="112" r="11" fill="url(#bird-dog-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="156" cy="84" rx="11" ry="15" fill="url(#bird-dog-muscle)" opacity="0.88" filter="url(#bird-dog-glow)" transform="rotate(22 156 84)"/><ellipse cx="44" cy="92" rx="11" ry="15" fill="url(#bird-dog-muscle)" opacity="0.88" filter="url(#bird-dog-glow)" transform="rotate(-22 44 92)"/>
  </g>
</svg>