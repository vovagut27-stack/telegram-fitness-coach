    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="72" y1="86" x2="42" y2="108" stroke="url(#push-up-body)" stroke-width="8" stroke-linecap="round"/><circle cx="72" cy="86" r="4.5" fill="#475569"/><circle cx="42" cy="108" r="4.5" fill="#475569"/><line x1="96" y1="86" x2="126" y2="108" stroke="url(#push-up-body)" stroke-width="8" stroke-linecap="round"/><circle cx="96" cy="86" r="4.5" fill="#475569"/><circle cx="126" cy="108" r="4.5" fill="#475569"/><line x1="76" y1="108" x2="58" y2="148" stroke="url(#push-up-body)" stroke-width="10" stroke-linecap="round"/><circle cx="76" cy="108" r="4.5" fill="#475569"/><circle cx="58" cy="148" r="4.5" fill="#475569"/><line x1="92" y1="108" x2="110" y2="148" stroke="url(#push-up-body)" stroke-width="10" stroke-linecap="round"/><circle cx="92" cy="108" r="4.5" fill="#475569"/><circle cx="110" cy="148" r="4.5" fill="#475569"/><line x1="58" y1="148" x2="44" y2="168" stroke="url(#push-up-body)" stroke-width="9" stroke-linecap="round"/><circle cx="58" cy="148" r="4.5" fill="#475569"/><circle cx="44" cy="168" r="4.5" fill="#475569"/><line x1="110" y1="148" x2="124" y2="168" stroke="url(#push-up-body)" stroke-width="9" stroke-linecap="round"/><circle cx="110" cy="148" r="4.5" fill="#475569"/><circle cx="124" cy="168" r="4.5" fill="#475569"/>
    <path d="M72 80 L76 108 L92 108 L96 80 Z" fill="url(#push-up-body)"/>
    <circle cx="84" cy="68" r="11" fill="url(#push-up-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="94" rx="26" ry="12" fill="url(#push-up-muscle)" opacity="0.88" filter="url(#push-up-glow)" transform="rotate(0 84 94)"/><ellipse cx="50" cy="112" rx="10" ry="16" fill="url(#push-up-muscle)" opacity="0.88" filter="url(#push-up-glow)" transform="rotate(-18 50 112)"/><ellipse cx="118" cy="112" rx="10" ry="16" fill="url(#push-up-muscle)" opacity="0.88" filter="url(#push-up-glow)" transform="rotate(18 118 112)"/>
