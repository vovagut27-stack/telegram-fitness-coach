    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="72" y1="70" x2="42" y2="92" stroke="url(#push-up-body)" stroke-width="8" stroke-linecap="round"/><circle cx="72" cy="70" r="4.5" fill="#475569"/><circle cx="42" cy="92" r="4.5" fill="#475569"/><line x1="96" y1="70" x2="126" y2="92" stroke="url(#push-up-body)" stroke-width="8" stroke-linecap="round"/><circle cx="96" cy="70" r="4.5" fill="#475569"/><circle cx="126" cy="92" r="4.5" fill="#475569"/><line x1="76" y1="92" x2="58" y2="132" stroke="url(#push-up-body)" stroke-width="10" stroke-linecap="round"/><circle cx="76" cy="92" r="4.5" fill="#475569"/><circle cx="58" cy="132" r="4.5" fill="#475569"/><line x1="92" y1="92" x2="110" y2="132" stroke="url(#push-up-body)" stroke-width="10" stroke-linecap="round"/><circle cx="92" cy="92" r="4.5" fill="#475569"/><circle cx="110" cy="132" r="4.5" fill="#475569"/><line x1="58" y1="132" x2="44" y2="168" stroke="url(#push-up-body)" stroke-width="9" stroke-linecap="round"/><circle cx="58" cy="132" r="4.5" fill="#475569"/><circle cx="44" cy="168" r="4.5" fill="#475569"/><line x1="110" y1="132" x2="124" y2="168" stroke="url(#push-up-body)" stroke-width="9" stroke-linecap="round"/><circle cx="110" cy="132" r="4.5" fill="#475569"/><circle cx="124" cy="168" r="4.5" fill="#475569"/>
    <path d="M72 64 L76 92 L92 92 L96 64 Z" fill="url(#push-up-body)"/>
    <circle cx="84" cy="52" r="11" fill="url(#push-up-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="78" rx="24" ry="11" fill="url(#push-up-muscle)" opacity="0.88" filter="url(#push-up-glow)" transform="rotate(0 84 78)"/><ellipse cx="50" cy="95" rx="9" ry="15" fill="url(#push-up-muscle)" opacity="0.88" filter="url(#push-up-glow)" transform="rotate(-22 50 95)"/><ellipse cx="118" cy="95" rx="9" ry="15" fill="url(#push-up-muscle)" opacity="0.88" filter="url(#push-up-glow)" transform="rotate(22 118 95)"/>
  </g>
  
  <g transform="translate(216, 48)">
