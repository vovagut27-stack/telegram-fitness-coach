<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Triceps dip">
  <defs>
    <linearGradient id="triceps-dip-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="triceps-dip-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="triceps-dip-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="triceps-dip-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="triceps-dip-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="triceps-dip-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="triceps-dip-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#triceps-dip-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Triceps dip</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#triceps-dip-card)" filter="url(#triceps-dip-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/><rect x="20" y="48" width="128" height="8" rx="4" fill="#64748b"/>
    <line x1="74" y1="92" x2="38" y2="56" stroke="url(#triceps-dip-body)" stroke-width="8" stroke-linecap="round"/><circle cx="74" cy="92" r="4.5" fill="#475569"/><circle cx="38" cy="56" r="4.5" fill="#475569"/><line x1="94" y1="92" x2="130" y2="56" stroke="url(#triceps-dip-body)" stroke-width="8" stroke-linecap="round"/><circle cx="94" cy="92" r="4.5" fill="#475569"/><circle cx="130" cy="56" r="4.5" fill="#475569"/><line x1="78" y1="118" x2="72" y2="158" stroke="url(#triceps-dip-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="118" r="4.5" fill="#475569"/><circle cx="72" cy="158" r="4.5" fill="#475569"/><line x1="90" y1="118" x2="96" y2="158" stroke="url(#triceps-dip-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="118" r="4.5" fill="#475569"/><circle cx="96" cy="158" r="4.5" fill="#475569"/>
    <path d="M74 88 L78 118 L90 118 L94 88 Z" fill="url(#triceps-dip-body)"/>
    <circle cx="84" cy="78" r="11" fill="url(#triceps-dip-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="102" rx="18" ry="10" fill="url(#triceps-dip-muscle)" opacity="0.88" filter="url(#triceps-dip-glow)" transform="rotate(0 84 102)"/><ellipse cx="48" cy="68" rx="9" ry="14" fill="url(#triceps-dip-muscle)" opacity="0.88" filter="url(#triceps-dip-glow)" transform="rotate(-20 48 68)"/><ellipse cx="120" cy="68" rx="9" ry="14" fill="url(#triceps-dip-muscle)" opacity="0.88" filter="url(#triceps-dip-glow)" transform="rotate(20 120 68)"/>
  </g>
</svg>