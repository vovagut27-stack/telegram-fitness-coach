<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Sumo squat">
  <defs>
    <linearGradient id="sumo-squat-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="sumo-squat-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="sumo-squat-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="sumo-squat-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="sumo-squat-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="sumo-squat-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="sumo-squat-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#sumo-squat-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Sumo squat</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#sumo-squat-card)" filter="url(#sumo-squat-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="74" y1="64" x2="54" y2="78" stroke="url(#sumo-squat-body)" stroke-width="7" stroke-linecap="round"/><circle cx="74" cy="64" r="4.5" fill="#475569"/><circle cx="54" cy="78" r="4.5" fill="#475569"/><line x1="94" y1="64" x2="114" y2="78" stroke="url(#sumo-squat-body)" stroke-width="7" stroke-linecap="round"/><circle cx="94" cy="64" r="4.5" fill="#475569"/><circle cx="114" cy="78" r="4.5" fill="#475569"/><line x1="72" y1="98" x2="52" y2="138" stroke="url(#sumo-squat-body)" stroke-width="11" stroke-linecap="round"/><circle cx="72" cy="98" r="4.5" fill="#475569"/><circle cx="52" cy="138" r="4.5" fill="#475569"/><line x1="92" y1="98" x2="116" y2="138" stroke="url(#sumo-squat-body)" stroke-width="11" stroke-linecap="round"/><circle cx="92" cy="98" r="4.5" fill="#475569"/><circle cx="116" cy="138" r="4.5" fill="#475569"/><line x1="52" y1="138" x2="48" y2="168" stroke="url(#sumo-squat-body)" stroke-width="10" stroke-linecap="round"/><circle cx="52" cy="138" r="4.5" fill="#475569"/><circle cx="48" cy="168" r="4.5" fill="#475569"/><line x1="116" y1="138" x2="120" y2="168" stroke="url(#sumo-squat-body)" stroke-width="10" stroke-linecap="round"/><circle cx="116" cy="138" r="4.5" fill="#475569"/><circle cx="120" cy="168" r="4.5" fill="#475569"/>
    <path d="M70 58 L74 98 L94 98 L98 58 Z" fill="url(#sumo-squat-body)"/>
    <circle cx="84" cy="48" r="11" fill="url(#sumo-squat-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="78" rx="22" ry="14" fill="url(#sumo-squat-muscle)" opacity="0.88" filter="url(#sumo-squat-glow)" transform="rotate(0 84 78)"/><ellipse cx="58" cy="125" rx="14" ry="18" fill="url(#sumo-squat-muscle)" opacity="0.88" filter="url(#sumo-squat-glow)" transform="rotate(0 58 125)"/><ellipse cx="110" cy="125" rx="14" ry="18" fill="url(#sumo-squat-muscle)" opacity="0.88" filter="url(#sumo-squat-glow)" transform="rotate(0 110 125)"/>
  </g>
