<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Barbell squat">
  <defs>
    <linearGradient id="barbell-squat-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="barbell-squat-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="barbell-squat-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="barbell-squat-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="barbell-squat-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="barbell-squat-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="barbell-squat-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#barbell-squat-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Barbell squat</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#barbell-squat-card)" filter="url(#barbell-squat-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="12" y1="168" x2="156" y2="168" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/><line x1="40" y1="58" x2="128" y2="58" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="102" x2="58" y2="142" stroke="url(#barbell-squat-body)" stroke-width="10" stroke-linecap="round"/><circle cx="72" cy="102" r="4.5" fill="#475569"/><circle cx="58" cy="142" r="4.5" fill="#475569"/><line x1="92" y1="102" x2="110" y2="142" stroke="url(#barbell-squat-body)" stroke-width="10" stroke-linecap="round"/><circle cx="92" cy="102" r="4.5" fill="#475569"/><circle cx="110" cy="142" r="4.5" fill="#475569"/><line x1="58" y1="142" x2="54" y2="168" stroke="url(#barbell-squat-body)" stroke-width="9" stroke-linecap="round"/><circle cx="58" cy="142" r="4.5" fill="#475569"/><circle cx="54" cy="168" r="4.5" fill="#475569"/><line x1="110" y1="142" x2="114" y2="168" stroke="url(#barbell-squat-body)" stroke-width="9" stroke-linecap="round"/><circle cx="110" cy="142" r="4.5" fill="#475569"/><circle cx="114" cy="168" r="4.5" fill="#475569"/>
    <path d="M70 62 L74 102 L94 102 L98 62 Z" fill="url(#barbell-squat-body)"/>
    <circle cx="84" cy="48" r="11" fill="url(#barbell-squat-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="66" cy="128" rx="14" ry="18" fill="url(#barbell-squat-muscle)" opacity="0.88" filter="url(#barbell-squat-glow)" transform="rotate(0 66 128)"/><ellipse cx="102" cy="128" rx="14" ry="18" fill="url(#barbell-squat-muscle)" opacity="0.88" filter="url(#barbell-squat-glow)" transform="rotate(0 102 128)"/><ellipse cx="84" cy="78" rx="20" ry="12" fill="url(#barbell-squat-muscle)" opacity="0.88" filter="url(#barbell-squat-glow)" transform="rotate(0 84 78)"/>
  </g>
</svg>