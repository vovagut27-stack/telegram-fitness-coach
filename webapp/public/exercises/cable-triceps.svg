<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 248" role="img" aria-label="Triceps pushdown">
  <defs>
    <linearGradient id="cable-triceps-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="cable-triceps-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="cable-triceps-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="cable-triceps-muscle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </radialGradient>
    <filter id="cable-triceps-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <filter id="cable-triceps-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="cable-triceps-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="400" height="248" fill="url(#cable-triceps-bg)" rx="16"/>
  <circle cx="48" cy="42" r="52" fill="#93c5fd" opacity="0.12"/>
  <circle cx="360" cy="218" r="64" fill="#6ee7b7" opacity="0.14"/>
  <text x="200" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Triceps pushdown</text>
  
  <g transform="translate(116, 48)">
    <rect x="0" y="0" width="168" height="178" rx="14" fill="url(#cable-triceps-card)" filter="url(#cable-triceps-shadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <line x1="84" y1="20" x2="84" y2="150" stroke="#64748b" stroke-width="3"/><circle cx="84" cy="20" r="6" fill="#94a3b8"/>
    <line x1="78" y1="58" x2="78" y2="78" stroke="url(#cable-triceps-body)" stroke-width="7" stroke-linecap="round"/><circle cx="78" cy="58" r="4.5" fill="#475569"/><circle cx="78" cy="78" r="4.5" fill="#475569"/><line x1="90" y1="58" x2="90" y2="78" stroke="url(#cable-triceps-body)" stroke-width="7" stroke-linecap="round"/><circle cx="90" cy="58" r="4.5" fill="#475569"/><circle cx="90" cy="78" r="4.5" fill="#475569"/><line x1="78" y1="98" x2="72" y2="158" stroke="url(#cable-triceps-body)" stroke-width="9" stroke-linecap="round"/><circle cx="78" cy="98" r="4.5" fill="#475569"/><circle cx="72" cy="158" r="4.5" fill="#475569"/><line x1="90" y1="98" x2="96" y2="158" stroke="url(#cable-triceps-body)" stroke-width="9" stroke-linecap="round"/><circle cx="90" cy="98" r="4.5" fill="#475569"/><circle cx="96" cy="158" r="4.5" fill="#475569"/>
    <path d="M74 52 L78 98 L90 98 L94 52 Z" fill="url(#cable-triceps-body)"/>
    <circle cx="84" cy="42" r="11" fill="url(#cable-triceps-body)" stroke="#64748b" stroke-width="1"/>
    <ellipse cx="84" cy="88" rx="14" ry="18" fill="url(#cable-triceps-muscle)" opacity="0.88" filter="url(#cable-triceps-glow)" transform="rotate(0 84 88)"/><ellipse cx="84" cy="68" rx="12" ry="10" fill="url(#cable-triceps-muscle)" opacity="0.88" filter="url(#cable-triceps-glow)" transform="rotate(0 84 68)"/>
  </g>
</svg>